l_korean:
 # ===== GUI =====
 HFP_CRISIS_TITLE:0 "위기"
 HFP_CRISIS_SUPPORT:0 "지지하기"
 HFP_CRISIS_NEUTRAL_BTN:0 "중립 선언"
 HFP_CRISIS_SUPPORTERS:0 "§Y지지 국가§!"
 HFP_CRISIS_NEUTRAL:0 "§G중립§!"

 # ===== [CRISIS.getDesc] =====
 HFP_CRISIS_DESC_DEFAULT:0 "현재 진행 중인 위기가 없습니다."
 HFP_CRISIS_DESC_JEOLLA_REUNITED:0 "기어이 §R전라인민공화국§!이 호남 전역을 붉은 깃발 아래 다시 불러모았습니다. 광주의 망령이 되살아나 §Y하나님께서 점지하신 이 땅§!을 통째로 집어삼키려 합니다.\n\n저 빨갱이들이 다시 하나로 뭉친 지금, 놈들을 도로 갈라놓지 않는다면 그 시뻘건 마수는 머지않아 낙동강을 넘어 들이닥칠 것입니다. 우리는 이 재통일을 §R결코§! 인정할 수 없습니다. 누가 이 거룩한 싸움에 함께 설 것입니까?"
 HFP_CRISIS_DESC_MARTIAL_LAW:0 "마침내 §Y주사위는 던져졌습니다§!. 자유민주주의를 약탈하고 헌정질서를 무너뜨리려는 파렴치한 §R종북 반국가세력§!을 일거에 척결하기 위하여, 비상계엄이 선포되었습니다.\n\n국회는 범죄자들의 소굴이 되었고, 저들은 입법 독재로 나라를 마비시켰습니다. 이제 §Y충성스러운 군과 검의 칼날§!이 저들의 목을 겨눕니다. 자유 대한민국의 운명이 이 한 번의 결단에 달렸습니다. 누가 각하의 곁에 설 것입니까?"

 # ===== 이벤트 0 : 재통일 뉴스 =====
 hfp_crisis.0.t:0 "전라인민공화국, 호남 재통일 선포"
 hfp_crisis.0.d:0 "광주를 중심으로 한 전라인민공화국이 호남 전역의 군소 세력을 흡수하며 마침내 재통일을 선포했습니다. 붉은 깃발이 다시 한반도 서남부를 뒤덮었습니다."
 hfp_crisis.0.a:0 "한반도가 다시 요동친다."

 # ===== 이벤트 1 : 대구 대응 =====
 hfp_crisis.1.t:0 "전라인민공화국의 부활"
 hfp_crisis.1.d:0 "광주를 중심으로 전라 전역이 다시 §R전라인민공화국§!의 깃발 아래 뭉쳤습니다. 저들의 통일을 그대로 두어선 안 됩니다. 다시 갈라놓고, 다시 분단시켜야 합니다.\n\n대구는 이 위기에 어떻게 응답하시겠습니까?"
 hfp_crisis.1.a:0 "마땅히 대응해야 한다!"
 hfp_crisis.1.b:0 "...우리가 나설 일이 아니다."

 # ===== 이벤트 10 : 주사위는 던져졌다 (비상계엄) =====
 hfp_crisis.10.t:0 "주사위는 던져졌다"
 hfp_crisis.10.d:0 "용산 대통령실이 전격적으로 비상계엄을 선포했습니다. 전국에 계엄군이 전개되고 국회와 정당 활동이 금지되었습니다. 한반도의 운명을 가를 주사위가 던져졌습니다."
 hfp_crisis.10.a:0 "이제 돌이킬 수 없다."

 # ===== 이벤트 11 : 비상계엄 선포 알림 =====
 hfp_crisis.11.t:0 "비상계엄 선포"
 hfp_crisis.11.d:0 "비상계엄이 선포되었습니다. 우리는 이 거대한 위기의 한복판에 서게 되었습니다. 이제 어느 편에 설 것인지 결정해야 합니다."
 hfp_crisis.11.a:0 "운명의 시간이 왔다."

 # ===== 디시전 =====
 HFP_crisis_category:0 "위기"
 HFP_toggle_crisis_gui:0 "위기 창 켜기/끄기"
 HFP_toggle_crisis_gui_desc:0 "위기(Crisis) GUI를 토글합니다. country_flag §YHFPGUI_CRISIS_ON§! 이 켜지면 창이 열리고, 꺼지면 닫힙니다."
 HFP_setup_demo_crisis:0 "위기 발생 (전라 재통일/데모)"
 HFP_setup_demo_crisis_desc:0 "전라인민공화국 재통일 위기 체인을 강제로 발동합니다.\n글로벌 플래그 설정 → 대구(TAE)에게 대응 이벤트 발송. 대구로 플레이 중일 때 테스트하십시오."
 HFP_setup_demo_martial_law:0 "위기 발생 (비상계엄/데모)"
 HFP_setup_demo_martial_law_desc:0 "비상계엄('주사위는 던져졌다') 위기를 발동합니다.\n글로벌 플래그 §YHFPGB_DICE_IS_CAST§! 설정 → VII(윤의철의 7군단)에 위기 창 자동 팝업. VII로 플레이 중일 때 테스트하십시오."
