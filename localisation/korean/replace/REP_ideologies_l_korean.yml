l_korean:
 spiritual_conscriptism: "영적 징집주의"
 spiritual_conscriptism_subtype: "영적 징집주의"
 spiritual_conscriptism_subtype_desc: "영적 징집주의는 모든 국민이 국가를 위해 정신적으로 헌신하고 희생해야 한다고 가르칩니다. 개인보다 공동체를, 물질보다 정신을 앞세우며 국가에 대한 봉사를 가장 높은 미덕으로 삼습니다. 총을 들 수 있는 자만이 온전한 인간으로 대접받으며, 병역을 감당하지 못하는 이들은 시민의 자격을 잃고 인간 이하의 존재로 멸시받습니다. 애국심과 도덕성을 끌어올린다는 명분 아래 자유와 다양성은 설 자리를 잃고, 헌신을 망설이는 이는 신심이 부족한 자로 낙인찍힙니다."
 spiritual_conscriptism_desc: "영적 징집주의"
 china_special_socialism_idea: "중국특색사회주의사상"
 neutrality: "권위주의"
 roh_samo: "노사모"
 roh_samo_desc: "국정원 체제"
 roh_samo_subtype_desc: "노사모는 거리와 광장에서 자라난 참여민주주의를 자랑으로 내세웁니다. 서민과 소외된 계층의 편에 서기를 약속하고, 지역주의 타파와 검찰 개혁, 평화통일과 균형발전을 핵심 과제로 외칩니다. 깨어있는 시민의 조직된 힘을 신조로 삼아, 광장의 열기가 식지 않는 한 결코 물러서지 않습니다."
 theminju: "더불어 민주주의"
 odo_marinism: "해병정신"
 odo_marinism_desc: "오도 짜세 해병체제"
 geunchulism: "근출주의"
 gumchal_dokjae: "검찰독재"
 military_dictatorship: "검찰독재"
 military_dictatorship_desc: "검찰독재 아래서는 선거가 아니라 총칼이 권력의 근거가 됩니다. 안보와 질서라는 명분이 모든 강압을 정당화하고, 소수 엘리트의 기득권은 국가의 대의로 포장됩니다. 언론과 집회, 표현의 자유는 차례로 봉인되며, 시민사회는 협력의 상대가 아니라 통제의 대상으로만 다뤄집니다."
 yongsanism:0 "용산주의"
 yongsanism_desc:0 "용산주의는 만인지상의 영도자이시며 대한민국의 빛과 소금이신 윤석열 대통령 각하께서 친히 창시하신 자유민주주의의 위대한 분파입니다. 자유를 지키기 위해서라면 동맹을 기습하고 적을 먼저 치는 일조차 마다하지 않으며, 반국가세력 앞에서는 한 치의 관용도 베풀지 않습니다. 인권이든 국제사회의 비난이든, 각하의 안위와 국가의 존속 앞에서는 모두 뒷전으로 미뤄질 따름입니다."
 aeguk_bosu: "애국보수" #애국보수라는 단어 은근 마음에 안드는데 고쳐야할 필요있음..
 aeguk_bosu_desc: "애국보수는 충과 효, 예의 같은 전통적 덕목을 현대에 되살리려는 보수주의입니다. 공동체를 위한 개인의 희생과 국익 우선을 당연한 도리로 여기고, 경제성장과 법질서를 무엇보다 중시합니다. 북한에는 결코 등을 보이지 않으며, 자유와 평등과 인권조차 한국적인 형태로 다듬어져야 비로소 받아들입니다."
 parkism: "박정희주의"
 parkism_subtype: "박정희주의"
 gaka: "박정희주의"
 chinbak: "친박" #(Proto-Park GeunHye)
 gaka_desc: "박정희주의는 국가가 직접 경제를 이끌어 고도성장과 사회 안정을 동시에 이루겠다고 약속합니다. 유능한 관료의 효율과 기업가 정신을 앞세워 성장을 밀어붙이고, 자유민주주의의 외형을 갖추면서도 위기라는 말이 나오는 순간 국가의 통제를 정당한 것으로 만듭니다. 잘 살게 해 주겠다는 약속 하나로 많은 것을 눈감게 하는 체제입니다."
 chinbak_desc: "친박은 박정희주의의 골격을 물려받되 한결 부드러운 얼굴을 덧씌웁니다. 경제민주화와 복지 확대를 내세우고 지역 균형 발전과 남북 화해에도 관심을 기울이며, 강경함보다는 포용을, 호령보다는 다독임을 앞세웁니다. 아버지 세대의 권위주의를 친서민의 언어로 다시 포장한 후예라 할 수 있습니다." #(Proto-Park GeunHye)
 implantism: "증강주의"
 implantism_subtype: "증강주의"
 implantism_subtype_desc: "증강주의는 인간을 완성된 존재가 아니라 끊임없이 개량해야 할 대상으로 봅니다. 유전공학과 나노기술, 인공지능과 가상현실이 인류를 다음 단계로 끌어올린다고 믿으며, 인간 개조를 떳떳한 국가 의제로 삼습니다. 과학기술 연구에 국력을 쏟아붓는 한편, 윤리 논란은 사회적 합의라는 절차로 무마하는 기술낙관의 신앙입니다."
 implantism_desc: "증강주의"
 idolism: "아이돌주의"
 idolism_subtype: "아이돌주의"
 idolism_subtype_desc: "아이돌주의는 무대 위의 화려함을 곧 진리로 떠받듭니다. 재능이나 업적보다 이미지와 인기를 앞세우고, 팬덤의 함성을 정당성의 근거로 삼습니다. 대중문화를 좌우하는 거대한 힘이지만, 그 이면에는 지나친 상업주의와 물신숭배의 그림자가 길게 드리워 있습니다."
 idolism_desc: "아이돌주의"
 feminism: "페미니즘"
 feminism_subtype: "페미니즘"
 feminism_ideology: "페미니즘"
 radical_feminism: "급진적 페미니즘"
 accelerated_feminism: "촉진적 페미니즘"
 radical_feminism_desc: "급진적 페미니즘은 가부장제를 여성 억압의 근본 원인으로 지목하고, 그것을 무너뜨릴 혁명적 변화를 요구합니다. 사회 구조와 문화에 깊이 박힌 차별과 폭력을 끄집어내어 여성의 완전한 해방을 향해 투쟁합니다. 법과 제도의 개정만으로는 부족하다고 보고, 의식과 일상까지 통째로 바꾸는 전면적인 사회 개조를 추구합니다."
 accelerated_feminism_desc: "촉진적 페미니즘은 거리의 구호 대신 제도의 힘을 빌려 여성의 권익을 끌어올립니다. 정치와 관료, 기업의 의사결정 자리에 여성을 앉히고 법과 정책으로 성평등을 못 박는 데 주력합니다. 남성 중심의 기득권 구조를 한 겹씩 허물어 가며, 선언이 아니라 실질적인 평등을 이루어 내려 합니다."
 feminism_desc: "애미-애비뒤진체제"
 socialism: "사회주의"
 socialism_desc: "전체주의 체제"
 parkism_desc: "유신체제"
 jongbuk: "종북좌파"
 jongbuk_desc: "종북좌파는 북한을 향한 시선이 늘 한 뼘쯤 너그럽습니다. 북한의 허물은 눈감거나 상대화하면서, 한미동맹과 자유민주주의에는 날을 세웁니다. 통일을 가장 앞선 과제로 외치지만, 그 셈법은 상호주의보다 일방적인 지원과 양보로 기울어 있습니다."
 NL: "NL" 
 NL_desc: "NL은 1980년대 중반 운동권에서 갈라져 나온 민족주의 성향의 정파입니다. 흔히 민족해방파로 불리지만 정작 본인들은 자주와 민주, 통일을 앞세운 자민통이라는 이름을 더 좋아합니다. 한국 사회의 근본 문제를 미국에 대한 종속에서 찾았고, 반미운동을 앞세워 주한미군 철수와 대북협력을 통한 통일을 주장했습니다."

 theocratic_totalitarianism: "신정주의적 전체주의"
 theocratic_totalitarianism_desc: "신정주의적 전체주의는 종교 권력이 국가를 통째로 지배하는 체제입니다. 국교의 교리와 가치가 정치와 경제, 사회와 문화 전반을 규율하고, 개인은 신앙 공동체에 완전히 예속됩니다. 이단으로 몰린 사상과 집단은 가차 없이 짓밟히며, 세속 정부는 신정 권력의 시중을 드는 처지로 내려앉습니다. 신을 의심할 자유 따위는 처음부터 허락되지 않습니다."
 
 #guomindazhongzhuyi
 national_kimdaejung_ideology: "국민김대중주의"
 national_kimdaejung_ideology_desc: "김대중 우상화 체제"
 national_kimdaejung_ideology_subtype: "국민김대중주의"
 national_kimdaejung_ideology_subtype_desc: "국민김대중주의는 전라인민공화국이 떠받드는 고유의 이념입니다. 강력한 국가와 일사불란한 대중동원이라는 파시즘적 골격 위에 민주화와 인권, 복지와 평화통일이라는 진보의 의제를 얹고, 그 정점에 김대중을 민족의 영원한 영도자로 모십니다. 햇볕정책은 온 세계를 비추는 빛으로, 노벨상의 영광은 곧 전라 인민의 영광으로 선전되며, 영도자의 어록과 초상은 집집마다 관청마다 거리마다 내걸립니다. 진보의 언어로 동원을 정당화하고 우상의 권위로 이견을 틀어막는, 모순을 끌어안은 결속의 체제입니다."

 #-- Communism --#
 commnuism_juche_subtype: "주체사상"
 commnuism_juche_subtype_desc: "주체사상은 인민대중의 자주성을 실현하기 위한 혁명사상임을 자처합니다. 정치에서의 자주, 경제에서의 자립, 국방에서의 자위를 내세워 짙은 민족주의의 색을 띠지만, 그 끝에는 수령 한 사람을 향한 절대복종이 자리합니다. 개인숭배와 권력 세습, 굳게 닫힌 빗장이 모두 여기에서 비롯되며, 폐쇄 체제의 뼈대를 이룹니다."
 maoism: "마오주의"
